<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oris Dental — Kapasitetsanalyse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #C9E9F3;
    --bg-card:      #ffffff;
    --bg-card-alt:  #EEF7FB;
    --ink:          #263150;
    --ink-mid:      #4a5a7a;
    --ink-light:    #7a8faa;
    --border:       rgba(38,49,80,0.10);
    --border-mid:   rgba(38,49,80,0.18);
    --boost:        #E8341A;
    --monitor:      #D08C00;
    --performer:    #1A8A52;
    --font-h:       'Play', sans-serif;
    --font-body:    'Barlow', sans-serif;
    --font-cond:    'Barlow Condensed', sans-serif;
    --radius-lg:    14px;
    --shadow-sm:    0 1px 3px rgba(38,49,80,0.08);
  }

  body { background: var(--bg); color: var(--ink); font-family: var(--font-body); font-size: 14px; -webkit-font-smoothing: antialiased; }

  #app { display: none; }
  #app.visible { display: block; }

  .header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: var(--font-h); font-size: 18px; font-weight: 700; color: var(--ink); }

  /* Scorecards som knapper */
  .stats-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; padding: 24px 40px; }
  .stat-card { 
    background: var(--bg-card); border-radius: var(--radius-lg); padding: 20px 24px; 
    border: 2px solid transparent; box-shadow: var(--shadow-sm); cursor: pointer;
    transition: all 0.2s ease;
  }
  .stat-card:hover { transform: translateY(-2px); border-color: var(--border-mid); }
  .stat-card.active { border-color: var(--ink); box-shadow: 0 0 0 2px rgba(38,49,80,0.1); }
  
  .stat-label { font-family: var(--font-cond); font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 8px; }
  .stat-value { font-family: var(--font-h); font-size: 36px; font-weight: 700; line-height: 1; }

  .main-content { padding: 0 40px 40px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; align-items: start; }
  .region-title { font-family: var(--font-h); font-size: 18px; font-weight: 700; margin-bottom: 12px; color: var(--ink-mid); border-bottom: 1px solid var(--border-mid); padding-bottom: 6px; }
  
  .table-container { background: var(--bg-card); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; text-align: left; }
  th { background: var(--bg-card-alt); padding: 12px 16px; font-family: var(--font-cond); font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--ink-light); }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
  
  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-family: var(--font-cond); font-size: 10px; font-weight: 700; text-transform: uppercase; border: 1px solid rgba(0,0,0,0.1); }
  .badge-BOOST { background: #FEF0ED; color: var(--boost); }
  .badge-MONITOR { background: #FEF8E7; color: var(--monitor); }
  .badge-PERFORMER { background: #E8F7EF; color: var(--performer); }

  .controls { padding: 0 40px 20px; }
  .search-input { padding: 10px 16px; border: 1.5px solid var(--border-mid); border-radius: 8px; width: 300px; outline: none; }

  @media (max-width: 1100px) { .main-content { grid-template-columns: 1fr; } .stats-bar { grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>

<div id="app">
  <header class="header">
    <div class="logo">Oris Dental</div>
    <div id="last-updated" style="font-size: 12px; color: var(--ink-light)">Laster...</div>
  </header>

  <div class="stats-bar">
    <div class="stat-card active" data-filter="all" id="card-all">
      <div class="stat-label">Klinikker analysert</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card" data-filter="BOOST" id="card-boost">
      <div class="stat-label">🔴 Boost</div>
      <div class="stat-value" style="color:var(--boost)" id="stat-boost">0</div>
    </div>
    <div class="stat-card" data-filter="MONITOR" id="card-monitor">
      <div class="stat-label">🟡 Monitor</div>
      <div class="stat-value" style="color:var(--monitor)" id="stat-monitor">0</div>
    </div>
    <div class="stat-card" data-filter="PERFORMER" id="card-performer">
      <div class="stat-label">🟢 Performer</div>
      <div class="stat-value" style="color:var(--performer)" id="stat-performer">0</div>
    </div>
  </div>

  <div class="controls">
    <input type="text" id="search" class="search-input" placeholder="Søk klinikk eller region...">
  </div>

  <main class="main-content" id="main-content"></main>
</div>

<script>
let allClinics = [];
let activeFilter = 'all';

async function loadData() {
    const response = await fetch('capacity.json?v=' + Date.now());
    const data = await response.json();
    allClinics = data.clinics || [];
    
    document.getElementById('stat-total').innerText = data.total_clinics;
    document.getElementById('stat-boost').innerText = data.summary.boost_count;
    document.getElementById('stat-monitor').innerText = data.summary.monitor_count;
    document.getElementById('stat-performer').innerText = data.summary.performer_count;
    
    const d = new Date(data.generated_at);
    document.getElementById('last-updated').innerText = `Sist oppdatert: ${d.toLocaleString('nb-NO')}`;
    render();
}

function render() {
    const container = document.getElementById('main-content');
    const search = document.getElementById('search').value.toLowerCase();
    
    // Kombinert filtrering
    const filtered = allClinics.filter(c => {
        const matchesFilter = activeFilter === 'all' || c.signal === activeFilter;
        const matchesSearch = c.name.toLowerCase().includes(search) || (c.region || '').toLowerCase().includes(search);
        return matchesFilter && matchesSearch;
    });

    const grouped = filtered.reduce((acc, c) => {
        const r = c.region || "Andre";
        if (!acc[r]) acc[r] = [];
        acc[r].push(c);
        return acc;
    }, {});

    container.innerHTML = Object.entries(grouped).map(([region, items]) => `
        <section class="region-section">
            <h2 class="region-title">${region} (${items.length})</h2>
            <div class="table-container">
                <table>
                    <thead><tr><th>Klinikk</th><th style="text-align:center">Ledig (14 dgr)</th><th style="text-align:right">Status</th></tr></thead>
                    <tbody>
                        ${items.sort((a,b) => b.free_hours - a.free_hours).map(c => `
                            <tr>
                                <td style="font-weight:700;">${c.name}</td>
                                <td style="text-align:center;">${c.free_hours} t</td>
                                <td style="text-align:right"><span class="badge badge-${c.signal}">${c.signal}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        </section>
    `).join('');
}

// Event Listeners for boksene
document.querySelectorAll('.stat-card').forEach(card => {
    card.addEventListener('click', () => {
        document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        activeFilter = card.dataset.filter;
        render();
    });
});

document.getElementById('search').addEventListener('input', render);
document.getElementById('app').classList.add('visible');
loadData();
</script>
</body>
</html>
